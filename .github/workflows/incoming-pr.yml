name: Handle Incoming Template Request

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  process-incoming-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply mrm-review-required label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['mrm-review-required']
            });

